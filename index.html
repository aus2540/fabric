        /* Animation ลายผ้าทอ */
        @keyframes slideRight { 0% { transform: translateX(-40px); } 100% { transform: translateX(0px); } }
        @keyframes slideDown { 0% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bounceSlow { 0%, 100% { transform: translateY(-5px); } 50% { transform: translateY(5px); } }
        @keyframes pulseSlow { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        .animate-fade-in-up { animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }
        .animate-slide-right { animation: slideRight 3s linear infinite; }
        .animate-slide-down { animation: slideDown 4s linear infinite; }
        .animate-spin-slow { animation: spinSlow 5s linear infinite; }
        .animate-bounce-slow { animation: bounceSlow 3s ease-in-out infinite; }
        .animate-pulse-slow { animation: pulseSlow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        function App() {
            const [step, setStep] = useState('start'); 
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [interludeStep, setInterludeStep] = useState(0);
            
            const [scores, setScores] = useState({
                traditional: 0, floral: 0, geometric: 0, animal: 0, pastel: 0
            });
            const [finalResult, setFinalResult] = useState(null);
            const [isCapturing, setIsCapturing] = useState(false);

            const [aiMessage, setAiMessage] = useState("");
            const [isGeneratingAI, setIsGeneratingAI] = useState(false);

            const audioRef = useRef(null);
            const [isMusicPlaying, setIsMusicPlaying] = useState(false);

            const toggleMusic = () => {
                if (audioRef.current) {
                    if (isMusicPlaying) {
                        audioRef.current.pause();
                    } else {
                        audioRef.current.play();
                    }
                    setIsMusicPlaying(!isMusicPlaying);
                }
            };

            const handleStart = () => {
                setStep('quiz');
                setCurrentQuestionIndex(0);
                setInterludeStep(0);
                setScores({ traditional: 0, floral: 0, geometric: 0, animal: 0, pastel: 0 });

                if (audioRef.current) {
                    audioRef.current.volume = 0.4;
                    audioRef.current.play().then(() => setIsMusicPlaying(true)).catch(e => console.log("Audio play blocked by browser:", e));
                }
            };

            const handleAnswer = (type) => {
                const newScores = { ...scores, [type]: scores[type] + 1 };
                setScores(newScores);
                setInterludeStep(0);
                setStep('interlude');
            };

            const handleNextInterlude = () => {
                const currentInterludes = questions[currentQuestionIndex].interlude;
                if (interludeStep < currentInterludes.length - 1) {
                    setInterludeStep(prev => prev + 1);
                } else {
                    if (currentQuestionIndex < questions.length - 1) {
                        setCurrentQuestionIndex(prev => prev + 1);
                        setStep('quiz');
                    } else {
                        calculateResult(scores);
                    }
                }
            };

            const calculateResult = (finalScores) => {
                setStep('loading');
                let maxType = 'traditional';
                let maxScore = -1;
                
                for (const [type, score] of Object.entries(finalScores)) {
                    if (score > maxScore) {
                        maxScore = score;
                        maxType = type;
                    }
                }
                setFinalResult(maxType);
                setAiMessage(""); 
                setTimeout(() => setStep('result'), 3500); 
            };

            const generateAIPrediction = async () => {
                if (!finalResult) return;
                setIsGeneratingAI(true);
                
                const apiKey = ""; // API Key ถูกฉีดอัตโนมัติในสภาพแวดล้อม
                const archetype = resultsData[finalResult].title;
                const pattern = resultsData[finalResult].pattern;
                
                const prompt = `คุณคือช่างทอผ้าชาวล้านนาผู้รอบรู้ ผู้เล่นแบบทดสอบได้ผลลัพธ์เป็นตัวตนแบบ "${archetype}" และมีลายผ้าประจำตัวคือ "${pattern}" 
                ช่วยเขียนคำทำนายหรือคำอวยพรสั้นๆ (ประมาณ 2-3 ประโยค) ที่มีความหมายลึกซึ้ง อบอุ่น และมีมนต์ขลังสไตล์ล้านนา 
                จากนั้นให้แนะนำไอเดียสร้างสรรค์ 1 ข้อ ในการนำลายผ้าหรือสีสันนี้ไปปรับใช้ในชีวิตประจำวันยุคใหม่ให้เก๋ไก๋ 
                จัดรูปแบบให้อ่านง่าย ใช้ภาษาที่สละสลวยและเป็นกันเอง`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        setAiMessage(data.candidates[0].content.parts[0].text);
                    } else {
                        setAiMessage("ช่างทอกำลังพักผ่อน... ลองขอคำทำนายใหม่อีกครั้งนะเจ้า");
                    }
                } catch (error) {
                    console.error("AI Generation Error:", error);
                    setAiMessage("สายลมพัดพาคำทำนายหายไป... ลองใหม่อีกครั้งนะเจ้า");
                } finally {
                    setIsGeneratingAI(false);
                }
            };

            const handleShare = async () => {
                setIsCapturing(true);
                try {
                    if (!window.html2canvas) {
                        await new Promise((resolve, reject) => {
                            const script = document.createElement('script');
                            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                            script.onload = resolve;
                            script.onerror = reject;
                            document.body.appendChild(script);
                        });
                    }

                    const element = document.getElementById('result-card-capture');
                    const actionButtons = document.getElementById('action-buttons');
                    const headerImage = document.getElementById('result-header-image');
                    
                    // ซ่อนปุ่มและภาพภายนอกชั่วคราว เพื่อป้องกัน Error เรื่อง Cross-Origin ตอนแคปรูปภาพ
                    if (actionButtons) actionButtons.style.display = 'none';
                    if (headerImage) headerImage.style.display = 'none';

                    const canvas = await window.html2canvas(element, {
                        useCORS: true,
                        allowTaint: true,
                        scale: 2, 
                        backgroundColor: '#FAF4EB'
                    });

                    // นำปุ่มและภาพกลับมาแสดงตามเดิม
                    if (actionButtons) actionButtons.style.display = 'flex';
                    if (headerImage) headerImage.style.display = 'block';

                    const image = canvas.toDataURL('image/png', 1.0);
                    const link = document.createElement('a');
                    link.download = `my-inner-pattern.png`;
                    link.href = image;
                    link.click();

                    const popup = document.createElement('div');
                    popup.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 bg-[#5C4033] text-[#FAF4EB] px-6 py-3 rounded-full text-sm shadow-xl transition-opacity z-50 font-light';
                    popup.innerText = 'บันทึกรูปภาพสำเร็จ!';
                    document.body.appendChild(popup);
                    setTimeout(() => { popup.style.opacity = '0'; setTimeout(() => popup.remove(), 500); }, 2500);
                } catch (err) {
                    console.error('Failed to capture image: ', err);
                    const actionButtons = document.getElementById('action-buttons');
                    const headerImage = document.getElementById('result-header-image');
                    if (actionButtons) actionButtons.style.display = 'flex';
                    if (headerImage) headerImage.style.display = 'block';
                    
                    const popup = document.createElement('div');
                    popup.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full text-sm shadow-xl transition-opacity z-50 font-light';
                    popup.innerText = 'เกิดข้อผิดพลาดในการบันทึกรูปภาพ';
                    document.body.appendChild(popup);
                    setTimeout(() => { popup.style.opacity = '0'; setTimeout(() => popup.remove(), 500); }, 2500);
                } finally {
                    setIsCapturing(false);
                }
            };

            return (
                <div className="relative min-h-screen bg-[#D0BCA7] text-[#3E2723] overflow-hidden font-sans selection:bg-[#FAF4EB]/50 flex items-center justify-center p-4">
                    
                    <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/woven-light.png')] opacity-20 mix-blend-multiply pointer-events-none"></div>

                    <audio ref={audioRef} src="https://cdn.pixabay.com/download/audio/2024/02/24/audio_1fe2d5f39b.mp3?filename=deep-meditation-192828.mp3" loop />

                    <button onClick={toggleMusic} className="fixed top-6 right-6 z-50 bg-[#FAF4EB]/80 backdrop-blur-md p-3 rounded-full text-[#5C4033] hover:bg-[#FAF4EB] transition-all shadow-md">
                        {isMusicPlaying ? <Volume2 className="w-4 h-4" /> : <VolumeX className="w-4 h-4" />}
                    </button>

                    {/* ---------------- หน้าเริ่มเกม ---------------- */}
                    {step === 'start' && (
                        <div className="relative z-10 max-w-lg w-full p-8 text-center animate-fade-in flex flex-col items-center">
                            <div className="w-48 h-48 sm:w-56 sm:h-56 mb-8 rounded-full overflow-hidden border-4 border-[#FAF4EB] shadow-[0_0_30px_rgba(255,255,255,0.4)] relative">
                                <img src={images.start} alt="Warm Journey" crossOrigin="anonymous" className="w-full h-full object-cover object-center img-sketch opacity-90" />
                                <div className="absolute inset-0 bg-[#C1A68D]/20 mix-blend-overlay"></div>
                            </div>

                            <h2 className="text-xs uppercase tracking-[0.3em] text-[#FAF4EB] mb-3 font-medium drop-shadow-sm glow-white">Find Your Inner Pattern</h2>
                            <h1 className="text-4xl sm:text-5xl font-serif font-bold mb-6 leading-tight text-[#FAF4EB] drop-shadow-md glow-white">
                                เปิดประกายข้างใน<br/>สู่เส้นด้ายที่เป็นคุณ
                            </h1>
                            <p className="text-[#3E2723] mb-10 font-medium leading-relaxed max-w-sm mx-auto text-sm sm:text-base bg-[#FAF4EB]/30 p-4 rounded-xl backdrop-blur-sm shadow-inner border border-[#FAF4EB]/50">
                                ชีวิต... ก็เหมือนการทอผ้าบางผืน<br/>
                                เต็มไปด้วยเส้นสายแห่งรอยยิ้ม บางเส้นคือหยดน้ำตา<br/>
                                มาร่วมค้นหาลวดลายที่ซ่อนอยู่ลึกๆ ภายในจิตใจ
                            </p>
                            <button onClick={handleStart} className="group relative px-8 py-4 bg-[#FAF4EB] text-[#5C4033] font-bold rounded-full hover:shadow-[0_0_20px_rgba(250,244,235,0.8)] transition-all duration-300">
                                <span className="flex items-center gap-2 tracking-wider">
                                    เริ่มค้นหาตัวตน <ChevronRight className="w-4 h-4 group-hover:translate-x-1 transition-transform" />
                                </span>
                            </button>
                        </div>
                    )}

                    {/* ---------------- หน้าคำถาม ---------------- */}
                    {step === 'quiz' && (
                        <div key={`quiz-${currentQuestionIndex}`} className="relative z-10 max-w-xl w-full p-6 sm:p-8 animate-fade-in-up mt-2">
                            
                            <div className="w-full h-36 sm:h-48 rounded-2xl overflow-hidden mb-8 relative border-4 border-[#FAF4EB] shadow-lg bg-[#FAF4EB]">
                                <img 
                                    src={images[`q${currentQuestionIndex}`]} 
                                    alt="Story Art" 
                                    crossOrigin="anonymous"
                                    // ปรับจุดศูนย์กลางภาพ หากเป็นข้อ 2 (index 1) ให้เลื่อนเห็นภาพวาดวัดด้านบนมากขึ้น
                                    style={{ objectPosition: currentQuestionIndex === 1 ? 'center 15%' : 'center' }}
                                    className="w-full h-full object-cover img-sketch opacity-90" 
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-[#D0BCA7]/60 to-transparent mix-blend-multiply"></div>
                            </div>

                            <div className="flex justify-center gap-1.5 mb-6">
                                {questions.map((_, idx) => (
                                    <div 
                                        key={idx} 
                                        className={`h-1.5 rounded-full transition-all duration-700 ${idx === currentQuestionIndex ? 'w-6 bg-[#FAF4EB] shadow-[0_0_8px_rgba(255,255,255,0.8)]' : idx < currentQuestionIndex ? 'w-2 bg-[#FAF4EB]/60' : 'w-2 bg-[#8C6D53]/40'}`}
                                    />
                                ))}
                            </div>

                            <p className="text-center text-[#FAF4EB] text-xs tracking-widest uppercase mb-3 font-medium drop-shadow-sm glow-white">
                                บทที่ {currentQuestionIndex + 1}
                            </p>
                            <h2 className="text-lg sm:text-2xl font-serif mb-8 text-center leading-relaxed text-[#3E2723] font-bold drop-shadow-sm">
                                {questions[currentQuestionIndex].question}
                            </h2>

                            <div className="space-y-3">
                                {questions[currentQuestionIndex].options.map((option, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => handleAnswer(option.type)}
                                        style={{ animationDelay: `${idx * 100}ms` }}
                                        className="w-full text-left p-4 rounded-xl bg-[#FAF4EB]/50 backdrop-blur-md border border-[#FAF4EB] hover:bg-[#FAF4EB]/90 hover:shadow-[0_4px_15px_rgba(250,244,235,0.5)] transition-all duration-300 group relative overflow-hidden animate-slide-up opacity-0 fill-mode-forwards text-[#4A3525] font-medium"
                                    >
                                        <span className="relative z-10 text-sm sm:text-base">
                                            {option.text}
                                        </span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* ---------------- หน้าคั่นเนื้อเรื่อง ---------------- */}
                    {step === 'interlude' && (
                        <div key={`interlude-${currentQuestionIndex}-${interludeStep}`} className="relative z-10 text-center animate-fade-in flex flex-col items-center justify-center min-h-[50vh]">
                            <Leaf className="w-10 h-10 text-[#FAF4EB] mb-8 animate-pulse-slow drop-shadow-[0_0_15px_rgba(255,255,255,0.8)] glow-white" />
                            
                            <p className="text-xl sm:text-2xl font-serif text-[#FAF4EB] leading-loose max-w-md mx-auto px-6 italic mb-12 drop-shadow-md glow-white whitespace-pre-line">
                                "{questions[currentQuestionIndex].interlude[interludeStep]}"
                            </p>
                            
                            <button 
                                onClick={handleNextInterlude}
                                className="group flex items-center gap-3 text-[#3E2723] bg-[#FAF4EB] px-6 py-3 rounded-full font-bold tracking-widest text-sm transition-all duration-500 hover:shadow-[0_0_15px_rgba(255,255,255,0.6)]"
                            >
                                <span>
                                    {interludeStep < questions[currentQuestionIndex].interlude.length - 1 
                                        ? "อ่านต่อ" 
                                        : (currentQuestionIndex < questions.length - 1 ? "ก้าวเดินต่อ" : "ค้นหาผลลัพธ์")}
                                </span>
                                <ChevronRight className="w-4 h-4 transform group-hover:translate-x-1 transition-transform" />
                            </button>
                        </div>
                    )}

                    {/* ---------------- หน้ากำลังประมวลผล ---------------- */}
                    {step === 'loading' && (
                        <div className="relative z-10 text-center animate-fade-in flex flex-col items-center justify-center">
                            <Star className="w-12 h-12 text-[#FAF4EB] mb-6 animate-spin-slow drop-shadow-[0_0_20px_rgba(255,255,255,0.9)] glow-white" />
                            <h2 className="text-2xl font-serif text-[#FAF4EB] mb-3 drop-shadow-md glow-white">กำลังถักทอเรื่องราวของคุณ...</h2>
                            <p className="text-[#5C4033] font-bold text-sm tracking-widest uppercase">Weaving your story</p>
                        </div>
                    )}

                    {/* ---------------- หน้าแสดงผลลัพธ์ ---------------- */}
                    {step === 'result' && finalResult && (
                        <div className="relative z-10 max-w-lg w-full py-6 animate-fade-in-up h-[95vh] overflow-y-auto no-scrollbar">
                            <div id="result-card-capture" className="relative rounded-[2rem] bg-[#FAF4EB]/95 backdrop-blur-xl border-4 border-[#FAF4EB] overflow-hidden shadow-2xl pb-8 mb-6">
                                
                                <div id="result-header-image" className="w-full h-40 relative overflow-hidden border-b border-[#D0BCA7]">
                                    <img src={resultImages[finalResult]} alt="Your Pattern" crossOrigin="anonymous" className="w-full h-full object-cover img-sketch opacity-80" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#FAF4EB] to-transparent"></div>
                                </div>

                                <div className="px-6 sm:px-10 text-center relative z-20 -mt-14">
                                    
                                    {/* Component แอนิเมชันลายผ้า */}
                                    <FabricAnimation type={finalResult} />

                                    <p className="text-xs uppercase tracking-[0.2em] text-[#8C6D53] mb-1 font-bold">Your Inner Pattern</p>
                                    <h1 className="text-3xl sm:text-4xl font-serif text-[#3E2723] mb-1 leading-tight font-bold">
                                        {resultsData[finalResult].title}
                                    </h1>
                                    <p className="text-sm font-medium text-[#8C6D53] mb-6 italic">
                                        "{resultsData[finalResult].archetype}"
                                    </p>

                                    <div className="inline-block px-4 py-1.5 rounded-full bg-[#E5D3B3] border border-[#C1A68D] text-xs text-[#5C4033] mb-6 tracking-wider font-bold shadow-sm">
                                        ลวดลายประจำตัว: {resultsData[finalResult].pattern}
                                    </div>

                                    <p className="text-[#5C4033] font-serif text-lg mb-6 leading-relaxed italic border-y border-[#C1A68D]/40 py-4">
                                        "{resultsData[finalResult].quote}"
                                    </p>

                                    <p className="text-[#4A3525] font-medium text-sm leading-relaxed mb-8 text-left">
                                        {resultsData[finalResult].description}
                                    </p>

                                    <div className="bg-[#E5D3B3]/30 border border-[#C1A68D]/40 rounded-2xl p-5 mb-5 text-left relative overflow-hidden shadow-inner">
                                        <BookOpen className="w-5 h-5 text-[#8C6D53] absolute top-5 right-5 opacity-40" />
                                        <h3 className="text-base font-serif text-[#5C4033] mb-3 font-bold flex items-center gap-2">
                                            {resultsData[finalResult].loreTitle}
                                        </h3>
                                        <p className="text-sm text-[#4A3525] font-medium leading-relaxed">
                                            {resultsData[finalResult].lore}
                                        </p>
                                    </div>

                                    <div className="bg-[#FAF4EB] border border-[#C1A68D]/50 rounded-2xl p-5 mb-8 text-left relative overflow-hidden">
                                        <Info className="w-5 h-5 text-[#8C6D53] absolute top-5 right-5 opacity-40" />
                                        <h3 className="text-sm font-serif text-[#5C4033] mb-3 font-bold flex items-center gap-2">
                                            <Sparkles className="w-4 h-4 text-[#8C6D53]"/> เคล็ดลับการดูแลผ้าทอประจำตัวคุณ
                                        </h3>
                                        <p className="text-xs text-[#4A3525] font-medium leading-relaxed mb-2">
                                            <strong className="text-[#3E2723]">ผ้าฝ้าย:</strong> แนะนำให้ลดการซักล้างหากไม่เปื้อนมาก นิยมใช้วิธีผึ่งลมหรือตากแดด หากจำเป็นต้องซัก ควรหลีกเลี่ยงสารเคมีรุนแรง และใช้น้ำยาซักผ้าฤทธิ์อ่อนเพื่อถนอมเส้นใยและสี
                                        </p>
                                        <p className="text-xs text-[#4A3525] font-medium leading-relaxed">
                                            <strong className="text-[#3E2723]">ผ้าไหม:</strong> ห้ามบิดผ้าเด็ดขาดเพื่อป้องกันเส้นใยหัก ซักด้วยแชมพูอ่อนๆ ตากลมในที่ร่ม แล้วรีดด้วยไฟแรงขณะผ้ายังมีความชื้น จะทำให้ผ้าไหมนุ่มและเงางาม
                                        </p>
                                    </div>

                                    {/* กล่องแสดงคำทำนาย AI */}
                                    <div className="bg-[#FAF4EB]/80 border border-[#C1A68D]/80 rounded-2xl p-5 mb-8 text-left relative shadow-sm">
                                        <Sparkles className="w-5 h-5 text-amber-500 absolute top-5 right-5 animate-pulse" />
                                        <h3 className="text-base font-serif text-[#5C4033] mb-3 font-bold flex items-center gap-2">
                                            คำทำนายจากเส้นฝ้าย
                                        </h3>
                                        
                                        {!aiMessage && !isGeneratingAI && (
                                            <div className="text-center py-2">
                                                <p className="text-xs text-[#8C6D53] mb-3">ให้ AI ช่างทอล้านนา ถักทอคำทำนายและไอเดียแฟชั่นเฉพาะสำหรับคุณ</p>
                                                <button 
                                                    onClick={generateAIPrediction}
                                                    className="bg-gradient-to-r from-amber-600 to-orange-500 hover:from-amber-700 hover:to-orange-600 text-white text-sm font-bold py-2.5 px-6 rounded-full transition-all shadow-md flex items-center justify-center gap-2 mx-auto"
                                                >
                                                    <Sparkles className="w-4 h-4" /> รับคำทำนายพิเศษ (AI)
                                                </button>
                                            </div>
                                        )}
                                        
                                        {isGeneratingAI && (
                                            <div className="flex flex-col items-center justify-center py-4 gap-2 text-amber-600">
                                                <Loader2 className="w-6 h-6 animate-spin" />
                                                <p className="text-xs font-medium">ช่างทอกำลังร้อยเรียงคำทำนาย...</p>
                                            </div>
                                        )}

                                        {aiMessage && !isGeneratingAI && (
                                            <div className="text-sm text-[#4A3525] font-medium leading-relaxed whitespace-pre-line animate-fade-in bg-white/60 p-4 rounded-xl border border-amber-200/50">
                                                {aiMessage}
                                            </div>
                                        )}
                                    </div>

                                    <div id="action-buttons" className="flex flex-col gap-3">
                                        <button 
                                            onClick={handleShare}
                                            disabled={isCapturing}
                                            className="w-full bg-[#5C4033] hover:bg-[#3E2723] disabled:bg-[#8C6D53] text-[#FAF4EB] font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 shadow-[0_4px_15px_rgba(92,64,51,0.3)]"
                                        >
                                            {isCapturing ? <Loader2 className="w-4 h-4 animate-spin" /> : <Download className="w-4 h-4" />}
                                            {isCapturing ? "กำลังสร้างรูปภาพ..." : "บันทึกเป็นรูปภาพและแชร์"}
                                        </button>
                                        <button 
                                            onClick={() => window.location.reload()}
                                            className="w-full bg-transparent border-2 border-[#8C6D53] text-[#5C4033] font-bold py-3 rounded-xl hover:bg-[#E5D3B3]/50 transition-colors flex items-center justify-center gap-2"
                                        >
                                            <RotateCcw className="w-4 h-4" /> ค้นหาตัวตนอีกครั้ง
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
